    <script>
        const pageData = {
            moduleNum: 3,
            title: "The Catalytic Cycle",
            content: `
                <!-- SECTION 1: INTRODUCTION -->
                <div class="card">
                    <h1>The Catalytic Cycle: A Molecular Dance</h1>
                    <p>The catalytic cycle is the heart of every cross-coupling reaction. It is a elegant sequence of molecular transformations in which the transition metal catalyst undergoes a series of oxidative additions, ligand exchanges, and reductive eliminations—all without being consumed in the process.</p>
                    <p>Understanding this cycle is essential for optimizing reaction conditions, selecting appropriate ligands, and troubleshooting failed reactions. In this module, we will dissect each step of the cycle, exploring the quantum mechanical and thermodynamic principles that govern reactivity.</p>
                </div>

                <!-- SECTION 2: THE THREE FUNDAMENTAL STEPS -->
                <div class="card" style="border-left-color: var(--primary);">
                    <h2>The Three Fundamental Steps</h2>
                    <p>Every cross-coupling catalytic cycle consists of three core steps, each representing a distinct transformation at the metal center. The metal acts as a chameleon, changing its oxidation state and coordination geometry to facilitate bond formation.</p>
                    
                    <p style="text-align: center; color: var(--text-muted); margin: 20px 0; font-size: 0.95rem;">
                        <em>Click on each step to explore the detailed mechanism</em>
                    </p>
                    
                    <div class="steps-container">
                        <div class="step-box step-1" onclick="showStep(1)">
                            <div class="step-number">01</div>
                            <div class="step-title">Oxidative Addition</div>
                            <div class="step-ox">M(0) → M(II)</div>
                        </div>
                        <div class="step-box step-2" onclick="showStep(2)">
                            <div class="step-number">02</div>
                            <div class="step-title">Transmetalation</div>
                            <div class="step-ox">M(II) → M(II)</div>
                        </div>
                        <div class="step-box step-3" onclick="showStep(3)">
                            <div class="step-number">03</div>
                            <div class="step-title">Reductive Elimination</div>
                            <div class="step-ox">M(II) → M(0)</div>
                        </div>
                    </div>

                    <!-- Step 1 Detail -->
                    <div class="step-detail" id="step-1">
                        <h3 style="color: var(--primary);">Step 1: Oxidative Addition</h3>
                        <p>Oxidative addition is the process by which the metal catalyst "inserts" itself into a covalent bond of the substrate. For cross-coupling, this is typically the Carbon-Halogen (C-X) bond of an aryl or alkyl halide.</p>
                        
                        <div class="reaction-scheme">
                            <div class="species-box species-catalyst">L<sub>n</sub>M(0)</div>
                            <span class="arrow-symbol">+</span>
                            <div class="species-box species-substrate">R-X</div>
                            <span class="arrow-symbol">→</span>
                            <div class="species-box species-intermediate">L<sub>n</sub>M(II)(R)(X)</div>
                        </div>
                        
                        <h4>Key Features:</h4>
                        <ul style="margin-left: 20px; color: var(--text-muted); line-height: 1.8;">
                            <li><strong>Oxidation State Change:</strong> The metal increases its oxidation state by 2 units (M<sup>0</sup> → M<sup>II</sup>), hence the term "oxidative."</li>
                            <li><strong>Electron Count:</strong> The metal gains 2 electrons (from the C-X bond), increasing its electron count by 2.</li>
                            <li><strong>Coordination Number:</strong> The coordination number increases by 2 as two new ligands (R and X) are added.</li>
                            <li><strong>Bond Cleavage:</strong> The C-X bond is broken, with both fragments binding to the metal.</li>
                        </ul>
                        
                        <div class="info-box">
                            <p><strong>Why Nickel Excels Here:</strong> Nickel has a higher oxophilicity than Palladium, meaning it forms stronger bonds with oxygen. This allows Ni to perform oxidative addition into C-O bonds—bonds that are too strong (high bond dissociation energy) for Pd to cleave. This is the key to utilizing biomass-derived substrates like aryl ethers.</p>
                        </div>

                        <h4>Mechanistic Pathways:</h4>
                        <p>Oxidative addition can proceed through different mechanisms depending on the metal and substrate:</p>
                        
                        <div class="comparison-grid">
                            <div class="metal-card">
                                <span class="metal-title">Concerted (3-Center)</span>
                                <p class="metal-desc">The metal attacks the C-X bond in a single step via a three-center transition state. Common for Pd with aryl halides. Stereoretentive (retains configuration at carbon).</p>
                            </div>
                            <div class="metal-card">
                                <span class="metal-title">Ionic (SN2-type)</span>
                                <p class="metal-desc">The metal acts as a nucleophile, displacing X<sup>-</sup> in an SN2-like fashion. Common for Ni with alkyl halides. Results in inversion of stereochemistry.</p>
                            </div>
                            <div class="metal-card">
                                <span class="metal-title">Radical (SET)</span>
                                <p class="metal-desc">Single Electron Transfer from Ni(I) generates a radical intermediate. Unique to Ni. Enables coupling of sterically hindered substrates and C(sp<sup>3</sup>)-O bonds.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2 Detail -->
                    <div class="step-detail" id="step-2">
                        <h3 style="color: var(--secondary);">Step 2: Transmetalation</h3>
                        <p>Transmetalation is the exchange of ligands between two metal centers. In cross-coupling, the organic group from the nucleophilic coupling partner (R'-M') is transferred to the catalyst, while the halide (X) is displaced.</p>
                        
                        <div class="reaction-scheme">
                            <div class="species-box species-intermediate">L<sub>n</sub>M(R)(X)</div>
                            <span class="arrow-symbol">+</span>
                            <div class="species-box species-substrate">R'-M'</div>
                            <span class="arrow-symbol">→</span>
                            <div class="species-box species-intermediate">L<sub>n</sub>M(R)(R')</div>
                            <span class="arrow-symbol">+</span>
                            <div class="species-box species-waste">M'-X</div>
                        </div>
                        
                        <h4>Key Features:</h4>
                        <ul style="margin-left: 20px; color: var(--text-muted); line-height: 1.8;">
                            <li><strong>No Oxidation State Change:</strong> The metal oxidation state remains constant (M<sup>II</sup> → M<sup>II</sup>).</li>
                            <li><strong>Ligand Exchange:</strong> One ligand (X) is replaced by another (R').</li>
                            <li><strong>Role of Base:</strong> In Suzuki coupling, a base (e.g., K<sub>2</sub>CO<sub>3</sub>) is required to activate the boron reagent by forming a tetracoordinate borate.</li>
                            <li><strong>Driving Force:</strong> Formation of a strong M'-X bond (e.g., B-O, Zn-X) provides thermodynamic driving force.</li>
                        </ul>
                        
                        <div class="info-box">
                            <p><strong>The "Transmetalation Problem" in Nickel:</strong> Transmetalation is often the rate-limiting step in Ni-catalyzed couplings. Nickel complexes tend to be more coordinatively saturated than Pd, making ligand exchange slower. Careful ligand selection (bulky, electron-rich phosphines or NHCs) can accelerate this step by creating coordinative unsaturation.</p>
                        </div>

                        <h4>Transmetalation by Reagent Type:</h4>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Reagent</th>
                                    <th>Mechanism</th>
                                    <th>Requirements</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Organoboron</strong> (Suzuki)</td>
                                    <td>Base-activated; forms [R-B(OR)<sub>3</sub>]<sup>-</sup></td>
                                    <td>Base (K<sub>2</sub>CO<sub>3</sub>, Cs<sub>2</sub>CO<sub>3</sub>), often aqueous solvent</td>
                                </tr>
                                <tr>
                                    <td><strong>Organozinc</strong> (Negishi)</td>
                                    <td>Direct transfer; highly reactive</td>
                                    <td>Anhydrous conditions; no base needed</td>
                                </tr>
                                <tr>
                                    <td><strong>Organostannane</strong> (Stille)</td>
                                    <td>Ligand-coupled; retention of stereochemistry</td>
                                    <td>No additives; works in neutral conditions</td>
                                </tr>
                                <tr>
                                    <td><strong>Grignard</strong> (Kumada)</td>
                                    <td>Rapid transfer; requires Ni or Fe</td>
                                    <td>Anhydrous; low temperature often needed</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Step 3 Detail -->
                    <div class="step-detail" id="step-3">
                        <h3 style="color: var(--accent);">Step 3: Reductive Elimination</h3>
                        <p>Reductive elimination is the final and crucial step where the two organic fragments (R and R') couple together and are released from the metal center, regenerating the active catalyst.</p>
                        
                        <div class="reaction-scheme">
                            <div class="species-box species-intermediate">L<sub>n</sub>M(R)(R')</div>
                            <span class="arrow-symbol">→</span>
                            <div class="species-box species-product">R-R'</div>
                            <span class="arrow-symbol">+</span>
                            <div class="species-box species-catalyst">L<sub>n</sub>M(0)</div>
                        </div>
                        
                        <h4>Key Features:</h4>
                        <ul style="margin-left: 20px; color: var(--text-muted); line-height: 1.8;">
                            <li><strong>Reduction:</strong> The metal oxidation state decreases by 2 units (M<sup>II</sup> → M<sup>0</sup>), hence "reductive."</li>
                            <li><strong>Bond Formation:</strong> A new C-C σ-bond is formed between the two organic groups.</li>
                            <li><strong>Catalyst Regeneration:</strong> The active catalyst is regenerated, ready to begin a new cycle.</li>
                            <li><strong>Stereochemistry:</strong> Requires the two groups to be cis to each other; proceeds with retention of stereochemistry at each carbon.</li>
                        </ul>
                        
                        <div class="info-box">
                            <p><strong>The "Cis-Requirement":</strong> For reductive elimination to occur, the two organic ligands must occupy cis positions on the metal center. If they are trans, isomerization must occur first. This is where ligand design becomes critical—bulky ligands can force cis geometry and accelerate elimination.</p>
                        </div>

                        <h4>Factors Affecting Reductive Elimination Rate:</h4>
                        <div class="comparison-grid">
                            <div class="metal-card">
                                <span class="metal-title">Oxidation State</span>
                                <p class="metal-desc">Higher oxidation states (M<sup>IV</sup>) undergo faster reductive elimination due to increased electrophilicity. Ni(IV) eliminates extremely rapidly, making high-valent Ni intermediates short-lived but highly reactive.</p>
                            </div>
                            <div class="metal-card">
                                <span class="metal-title">Ligand Effects</span>
                                <p class="metal-desc">Electron-withdrawing ligands accelerate elimination by making the metal more electrophilic. Bulky ligands can promote elimination by destabilizing the coordination sphere.</p>
                            </div>
                            <div class="metal-card">
                                <span class="metal-title">Substrate Sterics</span>
                                <p class="metal-desc">Bulky organic groups eliminate faster due to steric crowding. This is why sterically hindered couplings often give cleaner products—unwanted side reactions are outcompeted by rapid elimination.</p>
                            </div>
                        </div>

                        <div class="warning-box">
                            <p><strong>Side Reaction Alert:</strong> If reductive elimination is slow, competing β-hydride elimination can occur with alkyl groups, producing alkenes instead of the desired coupled product. This is a major issue in sp<sup>3</sup>-sp<sup>3</sup> couplings and must be suppressed by appropriate ligand choice.</p>
                        </div>
                    </div>
                </div>

                <!-- SECTION 3: ENERGY PROFILE -->
                <div class="card" style="border-left-color: var(--secondary);">
                    <h2>Energy Profile of the Catalytic Cycle</h2>
                    <p>The catalytic cycle is not a flat sequence—it has hills and valleys. Each step has an activation barrier that must be overcome, and intermediates occupy local energy minima. Understanding this profile helps identify the rate-determining step (RDS) and guides optimization.</p>

                    <div class="info-box">
                        <p><strong>Rate Determining Step (RDS):</strong> The step with the highest activation barrier governs the overall reaction rate. In Pd-catalyzed Suzuki coupling, oxidative addition is often RDS for electron-rich aryl halides, while transmetalation may be RDS for electron-poor substrates. In Ni catalysis, transmetalation is frequently RDS due to the "transmetalation problem."</p>

                <!-- SECTION 4: NICKEL VS PALLADIUM -->
                <div class="card" style="border-left-color: #ff0055;">
                    <h2>Nickel vs. Palladium: A Comparative Analysis</h2>
                    <p>While Palladium has been the dominant catalyst for cross-coupling for decades, Nickel has emerged as a powerful alternative with unique capabilities. Understanding their differences is crucial for catalyst selection.</p>
                    
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Property</th>
                                <th>Palladium (Pd)</th>
                                <th>Nickel (Ni)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Common Oxidation States</strong></td>
                                <td>0, +2</td>
                                <td>0, +1, +2, +3, +4</td>
                            </tr>
                            <tr>
                                <td><strong>Oxidative Addition</strong></td>
                                <td>Good for C-X (X = Cl, Br, I)</td>
                                <td>Excellent; can cleave C-O, C-N, C-S</td>
                            </tr>
                            <tr>
                                <td><strong>Transmetalation</strong></td>
                                <td>Fast with most reagents</td>
                                <td>Often slower; requires optimization</td>
                            </tr>
                            <tr>
                                <td><strong>Reductive Elimination</strong></td>
                                <td>Efficient for C(sp<sup>2</sup>)-C(sp<sup>2</sup>)</td>
                                <td>Fast; especially from high oxidation states</td>
                            </tr>
                            <tr>
                                <td><strong>Radical Pathways</strong></td>
                                <td>Rare</td>
                                <td>Common (SET mechanisms)</td>
                            </tr>
                            <tr>
                                <td><strong>Cost</strong></td>
                                <td>Expensive (~$50-100/g)</td>
                                <td>Cheap (~$0.01/g)</td>
                            </tr>
                            <tr>
                                <td><strong>Best Applications</strong></td>
                                <td>Aryl-aryl, aryl-alkenyl couplings</td>
                                <td>Alkyl-alkyl, C-O activation, biomass conversion</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="info-box">
                        <p><strong>When to Choose Nickel:</strong> Use Ni when (1) activating strong bonds (C-O, C-N, C-F), (2) coupling sp<sup>3</sup>-hybridized substrates, (3) running reactions at low temperature, (4) cost is a factor, or (5) radical mechanisms are desired for stereoselective control.</p>
                    </div>
                </div>

                <!-- SECTION 5: PRACTICAL CONSIDERATIONS -->
                <div class="card">
                    <h2>Practical Considerations for Optimization</h2>
                    <p>Running a successful cross-coupling reaction requires careful consideration of multiple parameters. Here is a troubleshooting guide based on the catalytic cycle.</p>
                    
                    <div class="timeline">
                        <div class="timeline-item">
                            <h4>Problem: Low Conversion</h4>
                            <p>Possible causes: (1) Catalyst not activating—try a more labile pre-catalyst like Pd(PPh<sub>3</sub>)<sub>4</sub> or Ni(cod)<sub>2</sub>; (2) Oxidative addition slow—increase temperature or use a more electron-rich ligand.</p>
                        </div>
                        <div class="timeline-item">
                            <h4>Problem: Side Products (Homocoupling)</h4>
                            <p>Possible causes: (1) Transmetalation too fast relative to oxidative addition—reduce nucleophile concentration; (2) Radical pathway interference—add radical inhibitors or change to a less reducing catalyst.</p>
                        </div>
                        <div class="timeline-item">
                            <h4>Problem: β-Hydride Elimination</h4>
                            <p>Possible causes: Slow reductive elimination allows competitive β-H elimination. Solution: Use bulky ligands to accelerate elimination, or switch to Ni which has faster elimination from high oxidation states.</p>
                        </div>
                        <div class="timeline-item">
                            <h4>Problem: Catalyst Decomposition</h4>
                            <p>Possible causes: (1) Formation of inactive Pd black or Ni clusters—add stabilizing ligands; (2) Ligand dissociation—use chelating ligands (dppf, dppe) instead of monodentate ones.</p>
                        </div>
                        <div class="timeline-item">
                            <h4>Problem: Poor Functional Group Tolerance</h4>
                            <p>Possible causes: Substrate contains groups that bind to or react with the catalyst. Solution: Protect sensitive groups, use milder reagents (Suzuki over Kumada), or add additives to suppress side reactions.</p>
                        </div>
                    </div>
                </div>

                <!-- SECTION 6: SUMMARY -->
                <div class="card" style="border-left-color: var(--primary);">
                    <h2>Module Summary: Key Takeaways</h2>
                    
                    <div class="comparison-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                        <div class="metal-card" style="border-left: 3px solid var(--primary);">
                            <span class="metal-title" style="color: var(--primary);">Oxidative Addition</span>
                            <p class="metal-desc">M(0) → M(II). Bond cleavage. Metal oxidized by 2 electrons. Key for substrate activation.</p>
                        </div>
                        <div class="metal-card" style="border-left: 3px solid var(--secondary);">
                            <span class="metal-title" style="color: var(--secondary);">Transmetalation</span>
                            <p class="metal-desc">Ligand exchange. No oxidation change. Brings nucleophilic partner to the metal. Often rate-limiting in Ni catalysis.</p>
                        </div>
                        <div class="metal-card" style="border-left: 3px solid var(--accent);">
                            <span class="metal-title" style="color: var(--accent);">Reductive Elimination</span>
                            <p class="metal-desc">M(II) → M(0). Bond formation. Product release. Catalyst regeneration. Requires cis geometry.</p>
                        </div>
                    </div>

                    </div>

        // --- STEP INTERACTION ---
        function showStep(stepNum) {
            // Hide all details
            document.querySelectorAll('.step-detail').forEach(el => el.classList.remove('active'));
            // Remove active from all steps
            document.querySelectorAll('.step-box').forEach(el => el.classList.remove('active'));
            
            // Show selected detail
            const detail = document.getElementById('step-' + stepNum);
            if(detail) detail.classList.add('active');
            
            // Mark step as active
            const steps = document.querySelectorAll('.step-box');
            if(steps[stepNum - 1]) steps[stepNum - 1].classList.add('active');
        }

        // --- BACKGROUND SCRIPT ---
        const canvas = document.getElementById('web-canvas');
        if(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            let particlesArray;
            const mouse = { x: null, y: null, radius: 150 };
            window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

            class Particle {
                constructor(x, y, dx, dy, size, color) {
                    this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                    this.size = size; this.color = color;
                    this.density = (Math.random() * 30) + 1;
                }
                draw() {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                    if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                    
                    let dx = mouse.x - this.x, dy = mouse.y - this.y, distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance, forceDirectionY = dy / distance, force = (mouse.radius - distance) / mouse.radius;
                        const directionX = forceDirectionX * force * this.density, directionY = forceDirectionY * force * this.density;
                        this.x -= directionX * 5; this.y -= directionY * 5;
                    } else { this.x += this.dx; this.y += this.dy; }
                    this.draw();
                }
            }
            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 9000;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 2) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let dx = (Math.random() * 0.4) - 0.2, dy = (Math.random() * 0.4) - 0.2;
                    let color = '#00f2ff'; 
                    particlesArray.push(new Particle(x, y, dx, dy, size, color));
                }
            }
            function connect() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let dist = ((particlesArray[a].x - particlesArray[b].x)**2 + (particlesArray[a].y - particlesArray[b].y)**2);
                        if (dist < (canvas.width/7)*(canvas.height/7)) {
                            opacityValue = 1 - (dist/20000);
                            ctx.strokeStyle = 'rgba(112, 0, 255,' + opacityValue + ')';
                            ctx.lineWidth = 1; ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, innerWidth, innerHeight);
                for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update();
                connect();
            }
            initParticles(); animate();
        }
    </script>
