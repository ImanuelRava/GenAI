<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title | AI in Chemistry</title>
    <style>
        :root { 
            --primary: #00f2ff; --secondary: #7000ff; --accent: #00ff88; 
            --bg-dark: #050a14; --glass-bg: rgba(10, 20, 40, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.1); --text-main: #fff; 
            --text-muted: #b0c4de; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        #web-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 95%); }
        
        header { height: 70px; border-bottom: 1px solid var(--glass-border); background: rgba(5, 10, 20, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 100; }
        .logo { font-size: 1.2rem; font-weight: 700; text-decoration: none; color: #fff; display: flex; align-items: center; gap: 10px; }
        .back-btn { color: var(--text-muted); text-decoration: none; border: 1px solid var(--glass-border); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; transition: 0.3s; }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 25px; width: 100%; flex: 1; }
        
        .content-card { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(12px); 
        }
        
        h2 { font-size: 2.5rem; margin-bottom: 25px; color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 20px; }
        p { color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; text-align: justify; }
        
        /* Tool UI Styling */
        .tool-interface { margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 30px; }
        .tool-interface h3 { color: #fff; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--accent); font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        input[type="text"], textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            color: #fff; border-radius: 8px; font-family: monospace; 
        }
        .btn-submit { background: var(--secondary); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-submit:hover { background: var(--primary); transform: translateY(-2px); }

        /* Iframe */
        .iframe-container { width: 100%; height: 70vh; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <canvas id="web-canvas"></canvas>

    <header>
        <a href="nicobot.html" class="logo"><span style="color:var(--primary);">&lt;</span> ChemAI Research</a>
        <a href="nicobot.html" class="back-btn">Back to Hub</a>
    </header>

    <div class="container">
        <div class="content-card">
            <h2 id="page-title">Loading...</h2>
            <div id="page-content"></div>
        </div>
    </div>

    <script>
        /* CONFIGURE THIS OBJECT FOR EACH FILE */
        const pageConfig = {
            type: 'text', // options: 'text', 'tool', 'embed'
            title: "Page Title",
            content: "<p>Content goes here...</p>",
            toolName: "Tool Name",
            toolAction: "Run",
            embedUrl: "https://example.com"
        };

        /* RENDERER */
        document.getElementById('page-title').innerText = pageConfig.title;
        const container = document.getElementById('page-content');

        if (pageConfig.type === 'text') {
            container.innerHTML = pageConfig.content;
        } else if (pageConfig.type === 'tool') {
            container.innerHTML = `
                ${pageConfig.content}
                <div class="tool-interface">
                    <h3>${pageConfig.toolName}</h3>
                    <div class="input-group"><label>Input Data</label><input type="text" placeholder="..."></div>
                    <div class="input-group"><label>Parameters</label><textarea rows="4"></textarea></div>
                    <button class="btn-submit" onclick="runBackend()">${pageConfig.toolAction}</button>
                    <p id="status" style="margin-top:15px; color:var(--primary); display:none;">Processing...</p>
                </div>`;
        } else if (pageConfig.type === 'embed') {
            container.innerHTML = `<div class="iframe-container"><iframe src="${pageConfig.embedUrl}"></iframe></div>`;
        }

        function runBackend() {
            const s = document.getElementById('status'); s.style.display='block';
            setTimeout(() => { s.innerText = "Done (Simulation)"; s.style.color = "var(--accent)"; }, 1500);
        }
        <!-- Paste Background Script Here -->
    </script>
</body>
</html>
