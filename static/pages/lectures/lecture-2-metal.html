    <script>
        const pageData = {
            moduleNum: 2,
            title: "The Role of Metal",
            content: `
                <div class="card">
                    <h1>The Role of Metal</h1>
                    <p>Cross-coupling is not merely a matter of mixing reagents; it is a quantum mechanical event orchestrated by the transition metal. The metal's ability to manipulate electrons via its <span class="math-term">d-orbitals</span> transforms thermodynamically unfavorable reactions into spontaneous processes.</p>
                </div>

                <!-- SECTION 1: QUANTUM REALITY -->
                <div class="card">
                    <h2>Electron Wavefunctions</h2>
                    <p>Contrary to the Bohr model, electrons do not orbit the nucleus in fixed paths. According to the Schrödinger equation, they exist as <span class="math-term">wavefunctions</span> (&Psi;). The shapes we visualize (orbitals) represent regions where the probability of finding an electron is high (&Psi;<sup>2</sup>).</p>
                    
                    <div class="info-box">
                        <p><strong>Key Concept: Nodes and Phases.</strong> Each lobe of a p or d orbital has a mathematical sign (phase): positive (+) or negative (-). When orbitals overlap during bond formation, "like" phases constructively interfere (bonding), while "opposite" phases destructively interfere (antibonding). This phase symmetry dictates whether a bond can form.</p>
                    </div>

                    <!-- CONTROLS -->
                    <div class="orbital-controls">
                        <span class="control-label">VISUALIZE ORBITAL:</span>
                        <select id="orbital-selector">
                            <option value="s">s-orbital (Spherical)</option>
                            <option value="p_x">p-orbital (p<sub>x</sub>)</option>
                            <option value="p_y">p-orbital (p<sub>y</sub>)</option>
                            <option value="p_z">p-orbital (p<sub>z</sub>)</option>
                            <option value="d_xy" selected>d-orbital (d<sub>xy</sub>) - Nodal Plane</option>
                            <option value="d_x2-y2">d-orbital (d<sub>x<sup>2</sup>-y<sup>2</sup></sub>)</option>
                            <option value="d_z2">d-orbital (d<sub>z<sup>2</sup></sub>) - Donut</option>
                        </select>
                    </div>

                    <!-- 3D VIEWER -->
                    <div id="orbital-viewer"></div>
                    <p style="text-align:center; font-size:0.9rem; color:var(--text-muted;">
                        Observe the <strong>d<sub>xy</sub></strong> orbital. Note the nodal planes (where probability is zero) along the X and Z axes. The alternating colors represent opposite wavefunction phases.
                    </p>
                </div>

                <!-- SECTION 2: CRYSTAL FIELD THEORY (FIXED MATH) -->
                <div class="card">
                    <h2>Crystal Field Theory & d-Orbital Splitting</h2>
                    <p>In a free ion, all five d-orbitals are degenerate (same energy). However, when ligands approach the metal, they repel the d-electrons, causing the orbitals to split into different energy levels.</p>
                    
                    <div class="info-box">
                        <p><strong>The Octahedral Splitting (&Delta;<sub>oct</sub>).</strong> In an octahedral complex (ML<sub>6</sub>), ligands approach along the Cartesian axes (X, Y, Z). Orbitals pointing <strong>directly</strong> at ligands (d<sub>x<sup>2</sup>-y<sup>2</sup></sub>, d<sub>z<sup>2</sup></sub>) experience maximum repulsion and become higher energy (the e<sub>g</sub> set). Orbitals lying <strong>between</strong> the ligands (d<sub>xy</sub>, d<sub>xz</sub>, d<sub>yz</sub>) experience less repulsion and become lower energy (the t<sub>2g</sub> set).</p>
                    </div>

                    <h3>High Spin vs. Low Spin</h3>
                    <p>The energy gap (&Delta;) determines the electronic configuration. If the ligand field is weak (small &Delta;), electrons will occupy higher orbitals to avoid pairing energy (P) — this is <strong>High Spin</strong>. If the ligand field is strong (large &Delta;), electrons will pair up in lower orbitals — this is <strong>Low Spin</strong>.</p>
                    
                    <h3>Impact on Catalysis</h3>
                    <ul style="margin-left: 20px; color: var(--text-muted); line-height: 1.8;">
                        <li><strong>Stability:</strong> A large &Delta; (strong field ligands like CO or CN<sup>-</sup>) stabilizes low oxidation states, facilitating <strong>Reductive Elimination</strong>.</li>
                        <li><strong>Reactivity:</strong> A small &Delta; (weak field) keeps the metal in a high-spin state, often making it more labile (prone to ligand exchange), which favors <strong>Oxidative Addition</strong>.</li>
                    </ul>
                </div>

                <!-- SECTION 3: DEWAR-CHATT-DUNCANSON (EXPANDED) -->
                <div class="card">
                    <h2>The Synergistic Effect: Dewar-Chatt-Duncanson Model</h2>
                    <p>In advanced couplings (Stille, Sonogashira), the bond between the metal and the nucleophile is not just a donation of electrons. It is a synergistic two-way street described by the <strong>Dewar-Chatt-Duncanson model</strong>, which specifically explains the bonding of metals to unsaturated ligands (like alkenes or CO).</p>
                    
                    <h3>The Two-Component Mechanism</h3>
                    <p>This model proposes that the metal-ligand bond consists of two distinct yet synergistic components:</p>
                    
                    <div class="comparison-grid">
                        <div style="text-align: left; padding: 10px;">
                            <h4 style="color: var(--primary); margin-bottom: 10px;">Component 1: &sigma;-Donation</h4>
                            <p style="font-size: 0.9rem; margin-bottom: 0;">The filled &sigma; bonding orbital of the ligand (e.g., the C=C &pi; bond in an alkene) overlaps with an empty hybrid orbital (sp<sup>3</sup> or dsp) on the metal. This donates electron density <strong>to</strong> the metal, forming a dative bond.</p>
                        </div>
                        <div style="text-align: left; padding: 10px;">
                            <h4 style="color: var(--secondary); margin-bottom: 10px;">Component 2: &pi;-Backbonding</h4>
                            <p style="font-size: 0.9rem; margin-bottom: 0;">Simultaneously, filled metal d-orbitals (specifically t<sub>2g</sub>) overlap with the empty &pi;<sup>*</sup> antibonding orbital of the ligand. This donates electron density <strong>back</strong> to the ligand.</p>
                        </div>
                    </div>

                    <div class="info-box">
                        <p><strong>Synergy & Bond Activation.</strong> &sigma;-donation fills the metal's empty orbitals (oxidative). &pi;-backbonding relieves electron density from the metal (reductive). Crucially, populating the ligand's &pi;<sup>*</sup> orbital <strong>weakens the ligand's internal bond</strong>. For example, in alkene coordination, the C=C bond lengthens and weakens, effectively "priming" it for the next step in the catalytic cycle.</p>
                    </div>
                </div>

                <!-- SECTION 4: 18-ELECTRON RULE & REDOX -->
                <div class="card">
                    <h2>The 18-Electron Rule & Coordinative Unsaturation</h2>
                    <p>Transition metals tend to achieve 18 valence electrons (noble gas configuration) to fill all bonding, non-bonding, and antibonding orbitals. However, <strong>catalysis requires instability</strong>.</p>
                    
                    <h3>Coordinative Unsaturation</h3>
                    <p>A stable 18-electron complex is a "dead end"—it has no vacant orbitals to bind new substrates. For a catalytic cycle to proceed, the metal must oscillate between <strong>18e (saturated)</strong> and <strong>16e or 14e (unsaturated)</strong> configurations. The unsaturated state creates a vacant coordination site for the electrophile.</p>
                    
                    <div class="oxi-flow">
                        <div class="oxi-step">
                            <div class="oxi-state">M(0)</div>
                            <div class="oxi-desc">d<sup>10</sup> Configuration. Stable (18e<sup>-</sup>), often a 14e or 16e complex to allow substrate binding.</div>
                        </div>
                        <div class="oxi-arrow">➜</div>
                        <div class="oxi-step">
                            <div class="oxi-state">M(II)</div>
                            <div class="oxi-desc">d<sup>8</sup> Configuration. Square planar. Strong ligands stabilize this low-spin state.</div>
                        </div>
                        <div class="oxi-arrow">➜</div>
                        <div class="oxi-step">
                            <div class="oxi-state">M(IV)</div>
                            <div class="oxi-desc">d<sup>6</sup> Configuration. Accessible to Ni. High energy state driving fast reductive elimination.</div>
                        </div>
                    </div>
                    
                    <h3>The "Chameleonic" Nature of Nickel</h3>
                    <p>Palladium generally cycles between 0 and +2 via a two-electron redox process. Nickel is unique because it can access <strong>+1 and +3 oxidation states</strong>. This allows Nickel to engage in <strong>Single Electron Transfer (SET)</strong> mechanisms. Instead of a clean 2e oxidative addition, Ni can undergo a radical pathway (Ni(I) &rarr; Ni(II) &rarr; Ni(III)), enabling it to couple inert alkyl halides and C(sp<sup>3</sup>)-O bonds that Palladium cannot touch.</p>
                </div>

                <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
                    <a href="lecture-2-metal.html" class="back-btn" style="margin-right: 15px;">← Module 2: Metal Role</a>
                    <a href="lecture-3-mechanism.html" class="back-btn" style="background:var(--secondary); color:#fff; font-weight:bold; padding: 10px 30px;">Next Module: Deep Dive Mechanism →</a>
                </div>
            `
        };

        // --- RENDERER ---
        document.getElementById('module-num').innerText = pageData.moduleNum;
        document.getElementById('content-area').innerHTML = pageData.content;

        // --- 3D ORBITAL SYSTEM ---
        let orbitalViewer = null;

        function drawAxes(viewer) {
            const axisLen = 4;
            // X-Axis (Red)
            viewer.addCylinder({start: {x:0,y:0,z:0}, end: {x:axisLen,y:0,z:0}, radius: 0.05, color: 'red'});
            viewer.addLabel("X", {position: {x:axisLen+0.2, y:0, z:0}, fontColor: 'red', fontSize: 14});
            // Y-Axis (Green)
            viewer.addCylinder({start: {x:0,y:0,z:0}, end: {x:0,y:axisLen,z:0}, radius: 0.05, color: 'green'});
            viewer.addLabel("Y", {position: {x:0, y:axisLen+0.2, z:0}, fontColor: 'green', fontSize: 14});
            // Z-Axis (Blue)
            viewer.addCylinder({start: {x:0,y:0,z:0}, end: {x:0,y:0,z:axisLen}, radius: 0.05, color: 'blue'});
            viewer.addLabel("Z", {position: {x:0, y:0, z:axisLen+0.2}, fontColor: 'blue', fontSize: 14});
        }

        function drawOrbital(viewer, type) {
            viewer.clear(); 
            drawAxes(viewer);
            viewer.addSphere({center: {x:0, y:0, z:0}, radius: 0.4, color: 'white', opacity: 0.9});

            const lobeRadius = 1.2;
            const baseDist = 1.8; 
            
            // For diagonal orbitals (xy), we must divide by sqrt(2) to keep Euclidean distance same as baseDist
            const diagDist = baseDist / 1.414; 

            const lobe1 = "#00f2ff"; // Cyan (Positive Phase)
            const lobe2 = "#7000ff"; // Purple (Negative Phase)

            switch(type) {
                case 's':
                    viewer.addSphere({center: {x:0, y:0, z:0}, radius: 1.5, color: lobe1, opacity: 0.5});
                    break;
                case 'p_x':
                    viewer.addSphere({center: {x:baseDist, y:0, z:0}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:-baseDist, y:0, z:0}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    break;
                case 'p_y':
                    viewer.addSphere({center: {x:0, y:baseDist, z:0}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:0, y:-baseDist, z:0}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    break;
                case 'p_z':
                    viewer.addSphere({center: {x:0, y:0, z:baseDist}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:0, y:0, z:-baseDist}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    break;
                case 'd_xy':
                    // Quadrant I (+x, +y) and III (-x, -y) are Positive Phase
                    // Quadrant II (-x, +y) and IV (+x, -y) are Negative Phase
                    
                    // Positive Phase (Cyan)
                    viewer.addSphere({center: {x:diagDist, y:diagDist, z:0}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:-diagDist, y:-diagDist, z:0}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    
                    // Negative Phase (Purple)
                    viewer.addSphere({center: {x:-diagDist, y:diagDist, z:0}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    viewer.addSphere({center: {x:diagDist, y:-diagDist, z:0}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    break;

                case 'd_x2-y2':
                    // Lobes ON the axes (X and Y)
                    viewer.addSphere({center: {x:baseDist, y:0, z:0}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:-baseDist, y:0, z:0}, radius: lobeRadius, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:0, y:baseDist, z:0}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    viewer.addSphere({center: {x:0, y:-baseDist, z:0}, radius: lobeRadius, color: lobe2, opacity: 0.6});
                    break;

                case 'd_z2':
                    // Z-axis lobes (Positive Phase)
                    viewer.addSphere({center: {x:0, y:0, z:2.2}, radius: 1.1, color: lobe1, opacity: 0.6});
                    viewer.addSphere({center: {x:0, y:0, z:-2.2}, radius: 1.1, color: lobe1, opacity: 0.6});

                    // Donut in XY plane (Negative Phase) - High Density for Solid Look
                    const donutRadius = 1.3;
                    const tubeRadius = 0.35; 
                    const numSpheres = 32; 
                    
                    for (let i = 0; i < numSpheres; i++) {
                        const angle = (i / numSpheres) * 2 * Math.PI;
                        const x = Math.cos(angle) * donutRadius;
                        const y = Math.sin(angle) * donutRadius;
                        viewer.addSphere({
                            center: {x: x, y: y, z: 0},
                            radius: tubeRadius, 
                            color: lobe2, // Purple (Negative Phase)
                            opacity: 0.7
                        });
                    }
                    break;
            }

            viewer.zoomTo();
            viewer.rotate(45, 'x'); 
            viewer.render();
        }

        function initOrbital() {
            const container = document.getElementById('orbital-viewer');
            if(!container) return;

            orbitalViewer = $3Dmol.createViewer(container, { backgroundColor: "transparent" });

            const selector = document.getElementById('orbital-selector');
            drawOrbital(orbitalViewer, selector.value);

            selector.addEventListener('change', (e) => {
                drawOrbital(orbitalViewer, e.target.value);
            });

            // ANIMATION LOOP - ROTATION DISABLED
            function animate() {
                orbitalViewer.render();
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Initialize after load
        setTimeout(initOrbital, 100);


        // --- BACKGROUND SCRIPT ---
        const canvas = document.getElementById('web-canvas');
        if(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            let particlesArray;
            const mouse = { x: null, y: null, radius: 150 };
            window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

            class Particle {
                constructor(x, y, dx, dy, size, color) {
                    this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                    this.size = size; this.color = color;
                    this.density = (Math.random() * 30) + 1;
                }
                draw() {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                    if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                    
                    let dx = mouse.x - this.x, dy = mouse.y - this.y, distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance, forceDirectionY = dy / distance, force = (mouse.radius - distance) / mouse.radius;
                        const directionX = forceDirectionX * force * this.density, directionY = forceDirectionY * force * this.density;
                        this.x -= directionX * 5; this.y -= directionY * 5;
                    } else { this.x += this.dx; this.y += this.dy; }
                    this.draw();
                }
            }
            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 9000;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 2) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let dx = (Math.random() * 0.4) - 0.2, dy = (Math.random() * 0.4) - 0.2;
                    let color = '#00f2ff'; 
                    particlesArray.push(new Particle(x, y, dx, dy, size, color));
                }
            }
            function connect() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let dist = ((particlesArray[a].x - particlesArray[b].x)**2 + (particlesArray[a].y - particlesArray[b].y)**2);
                        if (dist < (canvas.width/7)*(canvas.height/7)) {
                            opacityValue = 1 - (dist/20000);
                            ctx.strokeStyle = 'rgba(112, 0, 255,' + opacityValue + ')';
                            ctx.lineWidth = 1; ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, innerWidth, innerHeight);
                for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update();
                connect();
            }
            initParticles(); animate();
        }
    </script>
</html>
