        const pageData = {
            moduleNum: 1,
            title: "The Basics: Challenges, Mechanism & Reaction Types",
            content: `
                <!-- SECTION 1: INTRODUCTION -->
                <div class="card">
                    <h1>The Basics: Cross-Coupling Reactions</h1>
                    <p><strong>Cross-coupling reactions</strong> are a class of metal-catalyzed reactions where an organic halide (or pseudohalide) and an organometallic compound react to form a new carbon-carbon bond.</p>
                    <p>Before the advent of these reactions, chemists relied on less selective methods. Cross-coupling provides a powerful method to construct complex organic scaffolds with high chemoselectivity, overcoming the limitations of traditional organometallic reagents.</p>
                </div>

                <!-- SECTION 2: THE GENERAL REACTION (NEW UI) -->
                <div class="card">
                    <h2>The General Reaction Scheme</h2>
                    <p>According to the IUPAC definition, cross-coupling follows a generic scheme involving two coupling partners and a metal catalyst.</p>
                    
                    <!-- NEW PROFESSIONAL UI -->
                    <div class="reaction-diagram">
                        
                        <!-- NUCLEOPHILE -->
                        <div class="reaction-group group-nucl">
                            <div class="chem-box">R-M</div>
                            <div class="chem-label">Nucleophile</div>
                        </div>

                        <div class="op-symbol">+</div>

                        <!-- ELECTROPHILE -->
                        <div class="reaction-group group-elec">
                            <div class="chem-box">R'-X</div>
                            <div class="chem-label">Electrophile</div>
                        </div>

                        <div class="op-symbol" style="color: var(--accent);">
                            <!-- SVG Arrow -->
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </div>

                        <!-- PRODUCT -->
                        <div class="reaction-group group-prod">
                            <div class="chem-box">R-R'</div>
                            <div class="chem-label">Product</div>
                        </div>

                        <div class="op-symbol">+</div>

                        <!-- BYPRODUCT -->
                        <div class="reaction-group group-waste">
                            <div class="chem-box">M-X</div>
                            <div class="chem-label">Byproduct</div>
                        </div>

                    </div>
                    
                    <ul style="margin-left: 20px; color: var(--text-muted); line-height: 1.8;">
                        <li><strong>R-M:</strong> The organometallic reagent (e.g., Grignard, Organoboron, Organozinc). This provides the nucleophilic fragment.</li>
                        <li><strong>R'-X:</strong> The organic electrophile (e.g., Aryl halide). Contains the leaving group (X = Br, I, OTF).</li>
                        <li><strong>Catalyst:</strong> Usually Palladium (Pd) or Nickel (Ni).</li>
                    </ul>
                </div>

                <!-- SECTION 3: THREE CORE CHALLENGES (SVG ICONS) -->
                <div class="card">
                    <h2>Challenges in the Lab</h2>
                    <p>While the ideal cross-coupling reaction is chemically simple, achieving it in the lab is difficult. Historically, chemists have faced three major hurdles.</p>

                    <div class="comparison-grid">
                        <!-- CHALLENGE 1 -->
                        <div class="metal-card">
                            <div class="metal-icon">
                                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 2v7.31"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>
                            </div>
                            <span class="metal-title">Functional Group Compatibility</span>
                            <p class="metal-desc">Traditional reagents like Grignards are too reactive. They act as strong bases and attack sensitive groups (esters, carbonyls), destroying the molecule.</p>
                        </div>

                        <!-- CHALLENGE 2 -->
                        <div class="metal-card">
                            <div class="metal-icon">
                                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                            </div>
                            <span class="metal-title">Sustainability</span>
                            <p class="metal-desc">Many processes rely on expensive precious metals (Palladium) and toxic reagents (Stille), making them costly and environmentally harmful.</p>
                        </div>

                        <!-- CHALLENGE 3 -->
                        <div class="metal-card">
                            <div class="metal-icon">
                                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                            </div>
                            <span class="metal-title">Side Reactions</span>
                            <p class="metal-desc">In alkyl-alkyl couplings, the formation of alkenes (isomerization) is often a major side reaction, reducing yield and selectivity.</p>
                        </div>
                    </div>
                </div>

                <!-- SECTION 4: HISTORY & NOBEL PRIZE -->
                <div class="card" style="border-left-color: var(--accent);">
                    <h2>A Brief History & The Nobel Prize</h2>
                    <p>The development of cross-coupling is a landmark achievement in synthetic organic chemistry. Here is the timeline of its evolution, culminating in the 2010 Nobel Prize.</p>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="border-left: 3px solid var(--primary); padding-left: 15px;">
                            <h4 style="color: #fff;">1972: The First Step</h4>
                            <p style="font-size: 0.9rem; margin: 0;">Makoto Kumada and co-workers report the first cross-coupling reaction using a Nickel catalyst (Kumada Coupling).</p>
                        </div>

                        <div style="border-left: 3px solid var(--primary); padding-left: 15px;">
                            <h4 style="color: #fff;">1977: The Palladium Era</h4>
                            <p style="font-size: 0.9rem; margin: 0;">Richard F. Heck, Ei-ichi Negishi, and Akira Suzuki publish seminal papers on Palladium-catalyzed couplings of alkenes (Heck) and organoborons/zinc reagents.</p>
                        </div>

                        <div style="border-left: 3px solid var(--accent); padding-left: 15px; background: rgba(0, 255, 136, 0.05); padding: 10px 15px; border-radius: 0 8px 8px 0;">
                            <h4 style="color: var(--accent);">2010: The Nobel Prize</h4>
                            <p style="font-size: 0.9rem; margin: 0;">The Nobel Prize in Chemistry is awarded jointly to <strong>Heck, Negishi, and Suzuki</strong> "for palladium-catalyzed cross couplings in organic synthesis".</p>
                        </div>
                    </div>
                </div>

                <!-- SECTION 5: CATALYTIC CYCLE -->
                <div class="card">
                    <h2>The Catalytic Cycle</h2>
                    <p>The solution to these challenges is the Transition Metal Catalyst. It acts as a temporary mediator that controls the energy flow between reactants.</p>

                    <div class="oxi-flow">
                        <div class="oxi-step">
                            <h4>Step 1: Oxidative Addition</h4>
                            <p class="oxi-desc">The metal catalyst (M) inserts into the Carbon-Halogen (C-X) bond of the electrophile. The metal is "oxidized" (gains electrons) as it forms two new bonds.</p>
                            <p class="oxi-desc" style="color: var(--accent); font-size: 0.8rem;">Metal changes oxidation state (e.g., 0 &rarr; +2).</p>
                        </div>
                        <div class="oxi-arrow"></div>
                        
                        <div class="oxi-step">
                            <h4>Step 2: Transmetalation</h4>
                            <p class="oxi-desc">The nucleophile (R-M) transfers its organic group to the metal center, pairing it with the electrophile fragment.</p>
                        </div>
                        <div class="oxi-arrow"></div>
                        
                        <div class="oxi-step">
                            <h4>Step 3: Reductive Elimination</h4>
                            <p class="oxi-desc">The two organic groups bond together (R-R') and are released. The metal is reduced (loses electrons) and is freed to start the cycle again.</p>
                        </div>
                    </div>
                    
                    <div class="info-box">
                        <p><strong>Stereochemistry (Syn vs. Anti).</strong> Historically, cross-coupling was believed to proceed via syn-addition. However, Wikipedia and modern studies confirm that reactions involving organostannanes (Stille) often proceed with retention of configuration (stereoretentive), while other mechanisms can involve inversion. The exact stereochemical outcome depends heavily on the ligand and the metal.</p>
                    </div>
                </div>

                <!-- SECTION 6: NAME REACTIONS -->
                <div class="card" style="border-left-color: var(--secondary);">
                    <h2>Common "Name" Reactions</h2>
                    <p>Cross-coupling is not a single reaction, but a family of reactions categorized by the specific organometallic reagent used in the Transmetalation step.</p>
                    
                    <table class="reaction-table">
                        <thead>
                            <tr>
                                <th style="width: 15%">Reaction</th>
                                <th style="width: 20%">Reagent (Nucleophile)</th>
                                <th>Key Features & Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Suzuki-Miyaura</strong></td>
                                <td><strong>Organoboron</strong><br>(R-B(OR)<sub>2</sub>)</td>
                                <td>Non-toxic and air-stable. Requires a base (e.g., K<sub>2</sub>CO<sub>3</sub>) to activate the boron. Works in aqueous solvents. Byproducts are boric acid, making purification easy. Best for sp<sup>2</sup>-sp<sup>2</sup> coupling.</td>
                            </tr>
                            <tr>
                                <td><strong>Stille</strong></td>
                                <td><strong>Organostannane</strong><br>(R-SnR<sub>3</sub>)</td>
                                <td>Highly functional group tolerant. Stannanes are stable and easy to handle. <strong>Major Drawback:</strong> Organotin compounds are highly toxic and difficult to remove from the product, limiting pharmaceutical use.</td>
                            </tr>
                            <tr>
                                <td><strong>Negishi</strong></td>
                                <td><strong>Organozinc</strong><br>(R-ZnX)</td>
                                <td>Organozinc reagents are highly reactive and chemoselective. More reactive than Stille but less sensitive to air/water than Grignards. Often used for sp<sup>3</sup>-sp<sup>2</sup> coupling.</td>
                            </tr>
                            <tr>
                                <td><strong>Kumada</strong></td>
                                <td><strong>Grignard</strong><br>(R-MgX)</td>
                                <td>Very reactive. Requires Nickel (Ni) or Iron (Fe) catalysts. Sensitive to air/water. Limited functional group tolerance due to the strong basicity of the Grignard reagent.</td>
                            </tr>
                            <tr>
                                <td><strong>Heck</strong></td>
                                <td><strong>Alkene</strong><br>(No Organometallic)</td>
                                <td>Unique because it does not require an organometallic nucleophile. It couples an alkene directly with an aryl/vinyl halide via migratory insertion. Involves syn-addition and syn-elimination.</td>
                            </tr>
                            <tr>
                                <td><strong>Sonogashira</strong></td>
                                <td><strong>Alkynyl</strong><br>(R-C&equiv;C-H)</td>
                                <td>Couples terminal alkynes. Uses a Pd/Cu co-catalyst system. Copper acts as a base to deprotonate the alkyne. Essential for synthesizing enynes and conjugated polymers.</td>
                            </tr>
                            <tr>
                                <td><strong>Hiyama</strong></td>
                                <td><strong>Organosilicon</strong><br>(R-SiR<sub>3</sub>)</td>
                                <td>Uses abundant, non-toxic silicon. The C-Si bond is strong, so it requires a fluoride source (e.g., TBAF) to activate the reagent (transmetalation via pentavalent silicon).</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- SECTION 7: EVOLUTION -->
                <div class="card" style="border-left-color: #ff0055;">
                    <h2>Evolution: Unlocking the Strong Bonds</h2>
                    
                    <div class="comparison-grid">
                        <div class="metal-card">
                            <div class="metal-icon" style="color: #888;">Pd</div>
                            <span class="metal-title">The Palladium Limitation</span>

                        </div>
                        <div class="metal-card">
                            <div class="metal-icon" style="color: var(--accent);">Ni</div>
                            <span class="metal-title">The Nickel Solution</span>

                        </div>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
                    <a href="lecture-2-metal.html" class="back-btn" style="background:var(--primary); color:#000; font-weight:bold; padding: 10px 30px;">Next Module: The Role of Metal →</a>
                </div>
            `
        };

        // --- RENDERER ---
        document.getElementById('module-num').innerText = pageData.moduleNum;
        document.getElementById('content-area').innerHTML = pageData.content;

        // --- BACKGROUND SCRIPT (PURPLE THEME) ---
        const canvas = document.getElementById('web-canvas');
        if(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            let particlesArray;
            const mouse = { x: null, y: null, radius: 150 };
            window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

            class Particle {
                constructor(x, y, dx, dy, size, color) {
                    this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                    this.size = size; this.color = color;
                    this.density = (Math.random() * 30) + 1;
                }
                draw() {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                    if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                    
                    let dx = mouse.x - this.x, dy = mouse.y - this.y, distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance, forceDirectionY = dy / distance, force = (mouse.radius - distance) / mouse.radius;
                        const directionX = forceDirectionX * force * this.density, directionY = forceDirectionY * force * this.density;
                        this.x -= directionX * 5; this.y -= directionY * 5;
                    } else { this.x += this.dx; this.y += this.dy; }
                    this.draw();
                }
            }
            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 9000;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 2) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let dx = (Math.random() * 0.4) - 0.2, dy = (Math.random() * 0.4) - 0.2;
                    let color = '#00f2ff'; 
                    particlesArray.push(new Particle(x, y, dx, dy, size, color));
                }
            }
            function connect() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let dist = ((particlesArray[a].x - particlesArray[b].x)**2 + (particlesArray[a].y - particlesArray[b].y)**2);
                        if (dist < (canvas.width/7)*(canvas.height/7)) {
                            opacityValue = 1 - (dist/20000);
                            ctx.strokeStyle = 'rgba(112, 0, 255,' + opacityValue + ')';
                            ctx.lineWidth = 1; ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, innerWidth, innerHeight);
                for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update();
                connect();
            }
            initParticles(); animate();
        }
    </script>
