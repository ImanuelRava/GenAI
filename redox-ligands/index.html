<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redox-Active Ligands | GenAI Research</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #7c3aed;
            --accent: #10b981;
            --warning: #f59e0b;
            --red: #ef4444;
            --bg-main: #ffffff;
            --bg-gray: #f3f4f6;
            --bg-blue-light: #dbeafe;
            --bg-purple-light: #ede9fe;
            --bg-green-light: #d1fae5;
            --bg-dark: #1f2937;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #111827;
            --text-secondary: #374151;
            --text-muted: #6b7280;
            --text-light: #9ca3af;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius: 8px;
            --radius-lg: 12px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: var(--font-main); background-color: var(--bg-gray); color: var(--text-main); line-height: 1.6; display: flex; flex-direction: column; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header {
            background-color: var(--bg-gray);
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .header-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 24px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover,
        nav a.active {
            color: var(--primary);
        }


        





        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .content-area { flex: 1; padding: 40px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .coming-soon {
            text-align: center;
            padding: 60px 40px;
        }
        .coming-soon h1 { font-size: 2rem; color: var(--text-muted); margin-bottom: 16px; }
        .coming-soon p { font-size: 1rem; color: var(--text-light); }
        footer { background-color: var(--bg-dark); color: white; padding: 8px 20px; text-align: center; flex-shrink: 0; }
        footer p { font-size: 0.7rem; color: var(--text-light); }
        @media (max-width: 900px) {
            .header-layout { flex-direction: column; gap: 8px; }
            nav ul { justify-content: center; gap: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-layout">
            <a href="../index.html" class="logo-section">
                <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="30" stroke="#3b82f6" stroke-width="2"/>
                    <circle cx="32" cy="24" r="8" fill="#3b82f6"/>
                    <circle cx="24" cy="40" r="6" fill="#7c3aed"/>
                    <circle cx="40" cy="40" r="6" fill="#10b981"/>
                    <line x1="32" y1="32" x2="24" y2="34" stroke="#3b82f6" stroke-width="2"/>
                    <line x1="32" y1="32" x2="40" y2="34" stroke="#3b82f6" stroke-width="2"/>
                </svg>
                <div class="logo-text">
                    <span class="logo-title">GenAI Research</span>
                    <span class="logo-subtitle">Innovate & Discover</span>
                </div>
            </a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../AI/">Artificial Intelligence</a></li>
                    <li><a href="../TMC/">Transition Metal Catalysis</a></li>
                    <li><a href="./" class="active">Redox-Active Ligands</a></li>
                    <li><a href="../virus/">Virology</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="main-wrapper">
        <main class="content-area">
            <div class="coming-soon">
                <h1>🚧 Coming Soon</h1>
                <p>Redox-Active Ligands research content is under development.</p>
            </div>
        </main>
    </div>
    <footer>
        <p>Powered by TMC AI Engine | AI in Chemistry Initiative</p>
    </footer>
</body>
</html>
