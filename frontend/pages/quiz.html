<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 1 Quiz | AI in Chemistry</title>
    <!-- 3Dmol.js for chemical structure visualization -->
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>
    <style>
        /* --- CORE DESIGN SYSTEM (Matching index.html) --- */
        :root { 
            --primary: #00f2ff; 
            --secondary: #7000ff; 
            --accent: #00ff88; 
            --bg-dark: #050a14; 
            --glass-bg: rgba(10, 20, 40, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; 
            --text-muted: #b0c4de; 
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); scroll-behavior: smooth; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* --- CANVAS BACKGROUND --- */
        #web-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 95%);
        }

        /* --- HEADER STYLING (Identical to index.html) --- */
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 10, 20, 0.85);
            backdrop-filter: blur(8px);
        }

        .container {
            max-width: 1200px; 
            margin: 0 auto;
            padding: 0 25px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .header-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        /* --- MAIN LAYOUT ADJUSTMENTS --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 0;
        }

        /* --- QUIZ CARD --- */
        .quiz-card {
            background: var(--glass-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            position: relative;
            overflow: hidden;
            z-index: 10;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }

        .progress-container {
            width: 100%; height: 6px; background: rgba(0,0,0,0.3);
            border-radius: 10px; margin-bottom: 35px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; 
            background: linear-gradient(90deg, var(--secondary), var(--primary)); 
            width: 0%; 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 10px var(--primary);
        }

        #viewer-container {
            width: 100%; height: 320px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 25px; position: relative; display: none;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .viewer-instruction {
            position: absolute; bottom: 10px; right: 15px; font-size: 0.75rem;
            color: var(--text-muted); background: rgba(0,0,0,0.7); padding: 4px 8px;
            border-radius: 4px; pointer-events: none; z-index: 5;
        }

        .question-text { 
            font-size: 1.5rem; font-weight: 600; margin-bottom: 30px; 
            color: #fff; line-height: 1.4;
        }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

        .option-btn {
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 18px 24px; color: var(--text-muted);
            font-size: 1.05rem; cursor: pointer; text-align: left; transition: all 0.2s ease;
            position: relative; display: flex; align-items: center;
        }

        .option-btn:hover:not([disabled]) {
            background: rgba(255,255,255,0.05); 
            border-color: var(--primary); 
            transform: translateX(5px); 
            color: #fff;
        }

        .option-btn.correct { 
            background: rgba(0, 255, 136, 0.1); 
            border-color: var(--accent); 
            color: var(--accent); 
        }
        
        .option-btn.wrong { 
            background: rgba(255, 68, 68, 0.1); 
            border-color: #ff4444; 
            color: #ff4444; 
        }
        
        .status-icon { margin-left: auto; font-weight: bold; font-size: 1.4rem; display: none; }
        .option-btn.correct .status-icon, .option-btn.wrong .status-icon { display: block; }

        .next-btn {
            margin-top: 35px; 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: #fff; border: none;
            padding: 12px 30px; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; float: right; display: none;
            box-shadow: 0 4px 15px rgba(112, 0, 255, 0.3); transition: 0.3s;
        }
        .next-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 242, 255, 0.4); 
        }

        .score-screen { text-align: center; display: none; padding: 20px 0; }
        
        .score-circle {
            width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--primary);
            display: flex; justify-content: center; align-items: center; font-size: 2.8rem;
            font-weight: 800; color: var(--primary); margin: 0 auto 30px auto;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            transition: all 0.5s ease;
        }

        .score-msg { color: var(--text-muted); font-size: 1.3rem; margin-bottom: 40px; line-height: 1.6; }
        
        .retry-btn, .next-module-btn {
            background: transparent; 
            border: 2px solid var(--primary); 
            color: var(--primary);
            padding: 12px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s; 
            text-decoration: none; 
            display: inline-block; 
            margin: 5px;
        }
        
        .retry-btn:hover, .next-module-btn:hover { 
            background: var(--primary); 
            color: #000; 
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header-layout { flex-direction: column; gap: 15px; }
            nav ul { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .quiz-card { padding: 30px 20px; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- CANVAS BACKGROUND -->
    <canvas id="web-canvas"></canvas>

    <!-- HEADER (Same format as index.html) -->
    <header>
        <div class="container header-layout">
            <a href="../index.html" class="logo">ChemAI Research</a>
            <nav>
                <ul>
                    <li><a href="./introduction_nicobot.html">Home</a></li>
                    <li><a href="./data-extraction.html">Data Extraction</a></li>

    <main>
        <div class="container">
            <!-- Page title removed as requested -->

            <div class="quiz-card" id="quiz-box">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                
                <div id="viewer-container"></div>
                <div class="viewer-instruction">Interactive 3D Viewport</div>
                
                <div class="question-text" id="question">Initializing System...</div>

                <br><br>
                <a href="lecture-2-metal.html" class="next-module-btn" style="border-color: var(--accent); color: var(--accent);">Proceed to Module 2 →</a>
            </div>
        </div>
    </main>

    <script>
        // --- 1. GLOBAL VARIABLES ---
        let viewer = null; 
        let molData = {}; 
        let quizData = []; 
        
        // --- 2. FULL QUESTION BANK (50 Questions) ---
        const fullQuestionBank = [
            // --- THEORETICAL QUESTIONS (1-30) ---
            { id: 1, type: "theory", question: "Which step in the catalytic cycle involves the metal increasing its oxidation state?", options: ["Transmetalation", "Reductive Elimination", "Oxidative Addition", "Ligand Exchange"], correct: 2 },
            { id: 2, type: "theory", question: "In the Suzuki-Miyaura coupling, which atom from the boronic acid replaces the halide?", options: ["Oxygen", "Boron", "Carbon", "Hydrogen"], correct: 2 },
            { id: 3, type: "theory", question: "Why is Palladium (Pd) often preferred over Nickel (Ni) for standard couplings?", options: ["Pd is cheaper", "Pd is less toxic", "Pd has higher functional group tolerance", "Pd works without a base"], correct: 2 },
            { id: 4, type: "theory", question: "Which reaction uses a terminal alkyne as the nucleophile?", options: ["Suzuki", "Stille", "Sonogashira", "Negishi"], correct: 2 },
            { id: 5, type: "theory", question: "What is the role of the base in a Suzuki reaction?", options: ["To neutralize acid produced", "To activate the boronic acid", "To reduce the metal", "To oxidize the substrate"], correct: 1 },
            { id: 6, type: "theory", question: "Which metal reagent is used in the Kumada coupling?", options: ["Organozinc", "Organoboron", "Grignard (Organomagnesium)", "Organostannane"], correct: 2 },
            { id: 7, type: "theory", question: "What is a major disadvantage of the Stille coupling?", options: ["Requires high temperature", "Organotin reagents are highly toxic", "Requires expensive ligands", "Does not work with sp2 carbons"], correct: 1 },
            { id: 8, type: "theory", question: "In Reductive Elimination, what happens to the metal?", options: ["It is oxidized", "It is reduced", "It dissolves", "It changes color"], correct: 1 },
            { id: 9, type: "theory", question: "Which coupling reaction is used to form C-N bonds (Aminations)?", options: ["Suzuki", "Heck", "Buchwald-Hartwig", "Hiyama"], correct: 2 },
            { id: 10, type: "theory", question: "Which halogen is the most reactive leaving group in cross-coupling?", options: ["Chlorine (Cl)", "Bromine (Br)", "Iodine (I)", "Fluorine (F)"], correct: 2 },
            { id: 11, type: "theory", question: "Nickel is often used for C-O bond activation because it can access which oxidation states?", options: ["0 and +2 only", "+2 and +4", "+1 and +3", "0, +2, and +3"], correct: 3 },
            { id: 12, type: "theory", question: "Which reaction does NOT require an organometallic nucleophile?", options: ["Suzuki", "Stille", "Heck", "Negishi"], correct: 2 },
            { id: 13, type: "theory", question: "What is 'Beta-hydride elimination'?", options: ["A side reaction forming alkenes", "The name of the catalyst", "A way to purify the product", "The oxidation state change"], correct: 0 },
            { id: 14, type: "theory", question: "Which reagent class is used in the Hiyama coupling?", options: ["Organoboron", "Organosilicon", "Organotin", "Organomagnesium"], correct: 1 },
            { id: 15, type: "theory", question: "Electron-withdrawing groups on the aryl halide usually speed up which step?", options: ["Transmetalation", "Reductive Elimination", "Oxidative Addition", "Product Isolation"], correct: 2 },
            { id: 16, type: "theory", question: "Which metal is 'softer' and less electrophilic than Nickel?", options: ["Copper", "Palladium", "Iron", "Zinc"], correct: 1 },
            { id: 17, type: "theory", question: "Vinyl triflates are often used as alternatives to which functional group?", options: ["Vinyl Bromides", "Alkynes", "Phenols", "Amines"], correct: 0 },
            { id: 18, type: "theory", question: "Which reaction couples an alkene with an aryl halide?", options: ["Suzuki", "Heck", "Sonogashira", "Ullmann"], correct: 1 },
            { id: 19, type: "theory", question: "Buchwald-Hartwig amination typically requires which metal?", options: ["Ni", "Cu", "Pd", "Fe"], correct: 2 },
            { id: 20, type: "theory", question: "Which solvent is commonly used for Pd-catalyzed couplings?", options: ["Water only", "Toluene or Dioxane", "Hexane", "Methanol (only)"], correct: 1 },
            { id: 21, type: "theory", question: "What is the main benefit of using a ligand like SPhos or XPhos?", options: ["They are colorful", "They allow coupling of sterically hindered substrates", "They replace the need for a base", "They control the steric of the catalyst"], correct: 1 },
            { id: 22, type: "theory", question: "In Negishi coupling, the reagent is highly sensitive to:", options: ["Light", "Oxygen and Water", "Temperature", "Gravity"], correct: 1 },
            { id: 23, type: "theory", question: "What is the product of coupling phenylboronic acid with bromobenzene?", options: ["Biphenyl", "Benzene", "Diphenyl ether", "Biphenol"], correct: 0 },
            { id: 24, type: "theory", question: "Which reaction uses a Copper co-catalyst?", options: ["Stille", "Suzuki", "Sonogashira", "Heck"], correct: 2 },
            { id: 25, type: "theory", question: "Sp3-hybridized alkyl halides are harder to couple due to:", options: ["Beta-hydride elimination", "Being too large", "Being too reactive", "Forming radicals only"], correct: 0 },
            { id: 26, type: "theory", question: "Which Nobel Prize recognized Cross-Coupling reactions?", options: ["2005 Chemistry", "2010 Chemistry", "2001 Medicine", "2015 Physics"], correct: 1 },
            { id: 27, type: "theory", question: "The 'Transmetalation' step involves the transfer of:", options: ["Ligand to Metal", "Organic group from Nucleophile to Metal", "Electron from Metal to Substrate", "Proton to Base"], correct: 1 },
            { id: 28, type: "theory", question: "Which of these is NOT a 'Name Reaction' for cross-coupling?", options: ["Ullmann", "Fukuyama", "Friedel-Crafts", "Glaser"], correct: 2 },
            { id: 29, type: "theory", question: "Chloroarenes are challenging substrates because:", options: ["They are too expensive", "The C-Cl bond is very strong", "They explode easily", "They are liquids"], correct: 1 },
            { id: 30, type: "theory", question: "In modern green chemistry, which metal is targeted to replace Palladium?", options: ["Platinum", "Gold", "Nickel or Iron", "Mercury"], correct: 2 },

            // --- REACTIVITY & STRUCTURE QUESTIONS (31-50) ---
            { id: 31, type: "structure", question: "Considering the double bond in this structure, is it prone to Beta-Hydride elimination in a coupling reaction?", options: ["Yes, it has beta-hydrogens", "No, it lacks beta-hydrogens", "Only at high temperatures", "Only with Nickel"], correct: 0, molKey: "styrene" },
            { id: 32, type: "structure", question: "Can this reagent be used in a reaction if the substrate also contains an Ester group?", options: ["No, it will attack the Ester", "Yes, it is highly selective", "Only if the Ester is protected", "Only with Copper catalysis"], correct: 0, molKey: "phenylmagnesium_bromide" },
            { id: 33, type: "structure", question: "Compared to a Bromide or Iodide, is the C-X bond in this molecule more or less reactive towards Oxidative Addition?", options: ["Less reactive (Stronger bond)", "More reactive (Weaker bond)", "Equally reactive", "It depends on the solvent"], correct: 0, molKey: "chlorobenzene" },
            { id: 34, type: "structure", question: "Is this molecule generally the most reactive standard aryl halide?", options: ["Yes, C-I bond is weak", "No, C-Br is better", "No, C-Cl is better", "Yes, because of the ring strain"], correct: 0, molKey: "iodobenzene" },
            { id: 35, type: "structure", question: "What is a major chemical concern when using this reagent class in large scale synthesis?", options: ["High toxicity of the metal", "Extreme flammability", "Instability in air", "High cost"], correct: 0, molKey: "tetramethyltin" },
            { id: 36, type: "structure", question: "Will the steric bulk on this carbon hinder the Reductive Elimination step?", options: ["Yes, significantly", "No, steric effects are minor", "Only at low temperatures", "Only with Pd, not Ni"], correct: 0, molKey: "tert_butyl_bromide" },
            { id: 37, type: "structure", question: "Does the electron-withdrawing group on this ring speed up or slow down Oxidative Addition?", options: ["Speeds up", "Slows down", "Has no effect", "Inverts stereochemistry"], correct: 0, molKey: "nitrobenzene" },
            { id: 38, type: "structure", question: "Does the electron-donating group on this ring make the C-X bond easier or harder to break?", options: ["Harder to break", "Easier to break", "No effect", "Only affects solubility"], correct: 0, molKey: "anisole" },
            { id: 39, type: "structure", question: "Is the nitrile group generally compatible with Pd-catalyzed coupling conditions?", options: ["Yes, it is inert", "No, it reacts with the base", "No, it binds strongly to Pd", "Only with specific ligands"], correct: 0, molKey: "benzonitrile" },
            { id: 40, type: "structure", question: "Is the Ketone group in this molecule safe from nucleophilic attack under Suzuki conditions?", options: ["Yes, Boronic acids are mild", "No, it will be reduced", "No, it will form an enolate", "Only at low temperature"], correct: 0, molKey: "4_bromoacetophenone" },
            { id: 41, type: "structure", question: "In a Heck reaction, is this alkene an electron-poor Michael acceptor?", options: ["Yes, due to the carbonyl", "No, it is electron-rich", "No, it is saturated", "Only under basic conditions"], correct: 0, molKey: "acrylate" },
            { id: 42, type: "structure", question: "Compared to Bromide, is the OTf (Triflate) group a better or worse leaving group?", options: ["Better leaving group", "Worse leaving group", "Equivalent", "It is not a leaving group"], correct: 0, molKey: "vinyl_triflate" },
            { id: 43, type: "structure", question: "Does this reagent require a base (like K2CO3) to generate the active nucleophile?", options: ["Yes, essential for activation", "No, it is already active", "Only in aqueous solvents", "No, bases destroy it"], correct: 0, molKey: "phenyl_boronic" },
            { id: 44, type: "structure", question: "Is this reagent more or less reactive than a Grignard reagent?", options: ["Less reactive (more tolerant)", "More reactive", "Equally reactive", "It doesn't react at all"], correct: 0, molKey: "phenylzinc_bromide" },
            { id: 45, type: "structure", question: "Does the coupling of this terminal alkyne typically require a Copper (Cu) co-catalyst?", options: ["Yes, for transmetalation", "No, Pd is sufficient", "Only in aqueous media", "No, Copper poisons the reaction"], correct: 0, molKey: "phenylacetylene" },
            { id: 46, type: "structure", question: "Will the methyl group in the ortho position cause steric hindrance for the incoming ligand?", options: ["Yes, significant hindrance", "No, it is too small", "Only affects the color", "Only affects solubility"], correct: 0, molKey: "ortho_iodotoluene" },
            { id: 47, type: "structure", question: "Can the Hydroxyl (OH) group act as a leaving group in standard cross-coupling?", options: ["No, it is a poor leaving group", "Yes, it is excellent", "Only with Pd", "Only with Ni"], correct: 0, molKey: "phenol" },
            { id: 48, type: "structure", question: "What is the role of this molecule in the catalytic cycle?", options: ["Ligand (stabilizes metal)", "Substrate", "Base", "Solvent"], correct: 0, molKey: "triphenylphosphine" },
            { id: 49, type: "structure", question: "Is this sp3-hybridized alkyl halide prone to Beta-Hydride elimination?", options: ["Yes, it has beta-H's", "No, it lacks beta-H's", "Only if heated to 100C", "No, it is a primary halide"], correct: 0, molKey: "1_bromopropane" },
            { id: 50, type: "structure", question: "Does the amine group on this ring pose a risk of poisoning the metal catalyst?", options: ["Yes, strong binding", "No, it is inert", "Only if it is primary", "No, it actually helps the reaction"], correct: 0, molKey: "aniline" }
        ];

        // --- 3. SHUFFLE & SELECT 10 QUESTIONS ---
        function getRandomQuestions(allQuestions, count) {
            const shuffled = [...allQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        // --- 4. FETCH DATA & START QUIZ ---
        // Attempting to fetch from the backend. 
        // Note: If backend is not running, the .catch will trigger theory-only mode.
        fetch('http://127.0.0.1:5001/api/molecules')
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                molData = data;
                // If we have data, allow structure questions
                quizData = getRandomQuestions(fullQuestionBank, 10);
                initializeQuiz(); 
            })
            .catch(error => {
                console.warn("Backend unavailable:", error);
                // Fallback: Use only theory questions if molecules fail to load
                quizData = getRandomQuestions(fullQuestionBank.filter(q => q.type === 'theory'), 10);
                initializeQuiz();
            });

        // --- 5. 3D RENDERER ---
        function renderMolecule(molKey) {
            const container = document.getElementById('viewer-container');
            container.style.display = 'block';

            if (!viewer) {
                viewer = $3Dmol.createViewer(container, { backgroundColor: "transparent" });
            }

            if (!molData[molKey]) {
                console.error("Molecule key not found:", molKey);
                container.style.display = 'none';
                return;
            }

            // Decode base64 molfile
            const molBlock = atob(molData[molKey]);

            viewer.clear(); 
            viewer.addModel(molBlock, "mol");
            viewer.setStyle({}, {stick: {colorscheme: "Jmol", radius: 0.15}, sphere: {scale: 0.25}});
            viewer.zoomTo();

            const model = viewer.getModel();
            const atoms = model.selectedAtoms({});

            atoms.forEach(atom => {
                viewer.addLabel(atom.elem, {
                    position: {x: atom.x, y: atom.y, z: atom.z},
                    fontColor: 'white',
                    fontSize: 12,
                    backgroundColor: 'black',
                    backgroundOpacity: 0.5
                });
            });

            viewer.render();
        }

        // --- 6. QUIZ LOGIC ---
        let currentQIndex = 0;
        let score = 0;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const quizBox = document.getElementById('quiz-box');
        const scoreBox = document.getElementById('score-box');
        const finalScoreEl = document.getElementById('final-score');
        const scoreMsgEl = document.getElementById('score-msg');

        function initializeQuiz() {
            loadQuiz();
        }

        function loadQuiz() {
            // Hide 3D viewer by default, only show if needed
            document.getElementById('viewer-container').style.display = 'none';

            const currentData = quizData[currentQIndex];
            questionEl.innerText = currentData.question;
            optionsEl.innerHTML = '';
            
            if(currentData.molKey && molData[currentData.molKey]) {
                renderMolecule(currentData.molKey);
            }

            currentData.options.forEach((opt, index) => {
                const button = document.createElement('button');
                button.innerText = opt;
                button.classList.add('option-btn');
                const icon = document.createElement('span');
                icon.classList.add('status-icon');
                button.appendChild(icon);
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsEl.appendChild(button);
            });

            const progress = ((currentQIndex) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
            nextBtn.style.display = 'none';
        }

        function selectAnswer(selectedIndex, selectedBtn) {
            const correctIndex = quizData[currentQIndex].correct;
            const allBtns = optionsEl.children;
            Array.from(allBtns).forEach(btn => btn.disabled = true);

            if(selectedIndex === correctIndex) {
                selectedBtn.classList.add('correct');
                selectedBtn.querySelector('.status-icon').innerText = '✓';
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.querySelector('.status-icon').innerText = '✕';
                // Show correct answer
                allBtns[correctIndex].classList.add('correct');
                allBtns[correctIndex].querySelector('.status-icon').innerText = '✓';
            }
            nextBtn.style.display = 'block';
        }

        nextBtn.addEventListener('click', () => {
            currentQIndex++;
            if(currentQIndex < quizData.length) {
                loadQuiz();
            } else {
                showScore();
            }
        });

        // --- UPDATED SCORE LOGIC ---
        function showScore() {
            quizBox.style.display = 'none';
            scoreBox.style.display = 'block';
            const percentage = Math.round((score / quizData.length) * 100);
            finalScoreEl.innerText = `${percentage}%`;

            // Reset styles
            finalScoreEl.style.borderColor = '';
            finalScoreEl.style.color = '';
            finalScoreEl.style.boxShadow = '';

            if (percentage < 30) {
                finalScoreEl.style.borderColor = "#ff4444";
                finalScoreEl.style.color = "#ff4444";
                finalScoreEl.style.boxShadow = "0 0 30px rgba(255, 68, 68, 0.5)";
                scoreMsgEl.innerText = "Needs significant improvement. Please review the lecture notes.";
            } else if (percentage >= 30 && percentage <= 70) {
                finalScoreEl.style.borderColor = "#ffcc00"; 
                finalScoreEl.style.color = "#ffcc00";
                finalScoreEl.style.boxShadow = "0 0 30px rgba(255, 204, 0, 0.5)";
                scoreMsgEl.innerText = "Good progress. Keep studying the mechanisms.";
            } else {
                finalScoreEl.style.borderColor = "var(--accent)";
                finalScoreEl.style.color = "var(--accent)";
                finalScoreEl.style.boxShadow = "0 0 30px rgba(0, 255, 136, 0.5)";
                scoreMsgEl.innerText = "Excellent! You are ready for the lab.";
            }
        }
    </script>
    
    <!-- OPTIMIZED CANVAS BACKGROUND ANIMATION (Matching index.html) -->
    <script>
        const canvas = document.getElementById('web-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuration
        const PARTICLE_DENSITY = 9000;
        const MOUSE_RADIUS = 150;
        const CONNECT_DISTANCE = 120;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        const mouse = {
            x: null,
            y: null
        };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < MOUSE_RADIUS) {
                    const forceDirectionX = dx / distance;
                    const forceDirectionY = dy / distance;
                    const force = (MOUSE_RADIUS - distance) / MOUSE_RADIUS;
                    
                    const directionX = forceDirectionX * force * this.density;
                    const directionY = forceDirectionY * force * this.density;

                    this.x -= directionX * 5; 
                    this.y -= directionY * 5;
                } else {
                    this.x += this.directionX;
                    this.y += this.directionY;
                }
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / PARTICLE_DENSITY;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((canvas.width - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((canvas.height - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.4) - 0.2;
                let directionY = (Math.random() * 0.4) - 0.2;
                let color = '#00f2ff'; // Cyan particles
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) ** 2) +
                                   ((particlesArray[a].y - particlesArray[b].y) ** 2);
                    
                    if (distance < (CONNECT_DISTANCE * CONNECT_DISTANCE)) {
                        opacityValue = 1 - (distance / (CONNECT_DISTANCE * CONNECT_DISTANCE));
                        ctx.strokeStyle = 'rgba(112, 0, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        initParticles();
        animate();
    </script>
